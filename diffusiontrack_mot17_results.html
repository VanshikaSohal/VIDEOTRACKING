
<div style="padding: 1rem 0;">

  <div style="display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem;">
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.9rem; text-align:center;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">AP@0.50:0.95</div>
      <div style="font-size: 22px; font-weight: 500; color: #185FA5;">70.1%</div>
    </div>
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.9rem; text-align:center;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">AP@0.50</div>
      <div style="font-size: 22px; font-weight: 500; color: #3B6D11;">86.1%</div>
    </div>
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.9rem; text-align:center;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">AP@0.75</div>
      <div style="font-size: 22px; font-weight: 500; color: #3B6D11;">81.1%</div>
    </div>
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.9rem; text-align:center;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">AR@100</div>
      <div style="font-size: 22px; font-weight: 500; color: #185FA5;">73.4%</div>
    </div>
  </div>

  <div style="display: flex; gap: 16px; margin-bottom: 10px; font-size: 12px; color: var(--color-text-secondary);">
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#378ADD;display:inline-block;"></span>Average Precision (AP)</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#1D9E75;display:inline-block;"></span>Average Recall (AR)</span>
  </div>

  <div style="position: relative; width: 100%; height: 260px; margin-bottom: 1.5rem;">
    <canvas id="mainChart"></canvas>
  </div>

  <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 8px; font-weight: 500;">Area-wise breakdown</div>
  <div style="position: relative; width: 100%; height: 180px;">
    <canvas id="areaChart"></canvas>
  </div>

  <div style="margin-top: 1.5rem; padding: 12px 16px; background: var(--color-background-info); border-radius: var(--border-radius-md);">
    <div style="font-size: 13px; color: var(--color-text-info); font-weight: 500;">Note — ye COCO Detection metrics hain (AP/AR)</div>
    <div style="font-size: 12px; color: var(--color-text-info); margin-top: 4px;">HOTA/MOTA tracking scores alag hote hain. TrackEval se wo alag run karna padega.</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('mainChart'), {
  type: 'bar',
  data: {
    labels: ['AP\n@0.5:0.95', 'AP\n@0.50', 'AP\n@0.75', 'AR\n@1 det', 'AR\n@10 det', 'AR\n@100 det'],
    datasets: [
      {
        label: 'Score',
        data: [70.1, 86.1, 81.1, 4.4, 36.2, 73.4],
        backgroundColor: ['#378ADD','#378ADD','#378ADD','#1D9E75','#1D9E75','#1D9E75'],
        borderRadius: 4
      }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false },
      tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(1) + '%' } }
    },
    scales: {
      x: { ticks: { autoSkip: false, font: { size: 11 } }, grid: { display: false } },
      y: { min: 0, max: 100, ticks: { callback: v => v + '%' }, grid: { color: 'rgba(128,128,128,0.1)' } }
    }
  }
});

new Chart(document.getElementById('areaChart'), {
  type: 'bar',
  data: {
    labels: ['Small', 'Medium', 'Large'],
    datasets: [
      { label: 'AP', data: [34.6, 64.2, 79.2], backgroundColor: '#378ADD', borderRadius: 4 },
      { label: 'AR', data: [39.6, 67.8, 82.6], backgroundColor: '#1D9E75', borderRadius: 4 }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false },
      tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(1) + '%' } }
    },
    scales: {
      x: { grid: { display: false } },
      y: { min: 0, max: 100, ticks: { callback: v => v + '%' }, grid: { color: 'rgba(128,128,128,0.1)' } }
    }
  }
});
</script>
